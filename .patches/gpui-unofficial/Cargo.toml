[package]
edition = "2024"
name = "gpui-unofficial"
version = "1.8.2"
authors = ["Nathan Sobo <nathan@zed.dev>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Zed's GPU-accelerated UI framework"
homepage = "https://gpui.rs"
readme = "README.md"
keywords = [
    "desktop",
    "gui",
    "immediate",
]
categories = ["gui"]
license = "Apache-2.0"
repository = "https://github.com/iamnbutler/gpui-unofficial"

[features]
bench = [
    "test-support",
    "dep:criterion",
    "dep:hdrhistogram",
]
default = [
    "font-kit",
    "wayland",
    "x11",
    "windows-manifest",
]
input-latency-histogram = ["dep:hdrhistogram"]
leak-detection = ["backtrace"]
profiler = []
proptest = ["dep:proptest"]
screen-capture = ["scap"]
test-support = [
    "leak-detection",
    "collections/test-support",
    "http_client/test-support",
    "wayland",
    "x11",
    "proptest",
]
wayland = ["bitflags"]
windows-manifest = ["dep:embed-resource"]
x11 = ["scap?/x11"]

[lib]
name = "gpui"
path = "src/gpui.rs"
doctest = false

