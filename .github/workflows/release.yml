name: Release Tauri

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-release-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag source branch
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual workflow dispatch: skip release branch tag validation."
            exit 0
          fi

          git fetch --prune origin '+refs/heads/release/*:refs/remotes/origin/release/*'
          tag_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          release_branches="$(git branch -r --contains "${tag_commit}" | sed 's/^[*[:space:]]*//' | grep '^origin/release/' || true)"

          if [ -z "${release_branches}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on any origin/release/* branch."
            exit 1
          fi

          echo "Validated release tag on branch: $(printf '%s\n' "${release_branches}" | head -n 1)"

  build-macos-arm64:
    needs: validate-release-tag
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages and typecheck Tauri
        run: |
          npm run build -w @fileterm/core
          npm run build -w @fileterm/shared
          npm run build -w @fileterm/storage
          npm run typecheck -w @fileterm/tauri

      - name: Package macOS Apple Silicon
        run: npm run release:mac -w @fileterm/tauri

      - name: Verify macOS package
        shell: bash
        run: test -n "$(find apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v6
        with:
          name: FileTerm-macOS-arm64
          path: apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-macos-x64:
    needs: validate-release-tag
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages and typecheck Tauri
        run: |
          npm run build -w @fileterm/core
          npm run build -w @fileterm/shared
          npm run build -w @fileterm/storage
          npm run typecheck -w @fileterm/tauri

      - name: Package macOS Intel
        run: npm run release:mac:x64 -w @fileterm/tauri

      - name: Verify macOS package
        shell: bash
        run: test -n "$(find apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name '*.dmg' -print -quit)"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v6
        with:
          name: FileTerm-macOS-x64
          path: apps/tauri/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    needs: validate-release-tag
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages and typecheck Tauri
        run: |
          npm run build -w @fileterm/core
          npm run build -w @fileterm/shared
          npm run build -w @fileterm/storage
          npm run typecheck -w @fileterm/tauri

      - name: Require the updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'Missing repository secret TAURI_SIGNING_PRIVATE_KEY. See README release prerequisites.'
          }

      - name: Package signed Windows installer and updater signature
        run: npm run release:win -w @fileterm/tauri

      - name: Create GitHub Release updater manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: node ./scripts/create-windows-updater-manifest.mjs ./src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis
        working-directory: apps/tauri

      - name: Verify Windows updater artifacts
        shell: pwsh
        run: |
          $bundleDir = 'apps/tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis'
          if (-not (Get-ChildItem -LiteralPath $bundleDir -Filter '*.exe' -File)) { throw 'NSIS installer was not generated.' }
          if (-not (Get-ChildItem -LiteralPath $bundleDir -Filter '*-setup.exe.sig' -File)) { throw 'NSIS updater signature was not generated.' }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: FileTerm-Windows-x64
          path: |
            apps/tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            apps/tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
            apps/tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/latest.json
          if-no-files-found: error

  release:
    needs: [validate-release-tag, build-macos-arm64, build-macos-x64, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v7

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" -R "${repo}" >/dev/null 2>&1; then
            gh release delete "${tag}" -R "${repo}" --yes
          fi

          notes_file="docs/quality/release-notes-${tag#v}.md"
          notes_flags=(--generate-notes)
          if [ -f "${notes_file}" ]; then
            notes_flags=(--notes-file "${notes_file}")
          fi
          release_flags=()
          if [[ "${tag}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          mapfile -d '' assets < <(find . -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.sig' -o -name 'latest.json' \) -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo 'No Tauri release assets were downloaded.'
            exit 1
          fi

          gh release create "${tag}" -R "${repo}" \
            "${release_flags[@]}" \
            "${notes_flags[@]}" \
            "${assets[@]}"
