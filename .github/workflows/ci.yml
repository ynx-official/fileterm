name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages (core → shared → storage)
        run: |
          npm run build -w @fileterm/core
          npm run build -w @fileterm/shared
          npm run build -w @fileterm/storage

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Run transfer protocol tests
        run: npm run test:transfers:protocol -w @fileterm/electron

  tauri-socket-lifecycle:
    name: Tauri socket lifecycle (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # windows-latest currently resolves to the rolling VS 2026 image, which
        # intermittently produces test executables that fail during DLL loading.
        os: [macos-latest, ubuntu-latest, windows-2022]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows native build dependencies
        if: runner.os == 'Windows'
        run: |
          choco install nasm --no-progress --yes
          nasm -v

      - name: Install Linux Tauri link dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Verify direct Telnet socket release
        working-directory: apps/tauri/src-tauri
        run: cargo test sessions::telnet::tests::direct_transport_drop_releases_socket_on_every_desktop_platform

  tauri-serial-virtual:
    name: Tauri virtual serial (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri link dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Exercise a kernel PTY through tokio-serial
        working-directory: apps/tauri/src-tauri
        run: cargo test sessions::serial::tests::virtual_pty_round_trip_exercises_the_real_serial_stack

  tauri-real-protocols:
    name: Tauri real protocol fixtures (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protocol fixtures and Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server openssl python3 libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Exercise Tauri protocol services
        working-directory: apps/tauri/src-tauri
        run: cargo test --lib -- --test-threads=1
