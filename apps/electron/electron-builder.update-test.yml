# Local-only updater test configuration. Production builds continue to use the
# GitHub provider configured in package.json.
appId: com.fileterm.desktop
productName: FileTerm
asar: true
directories:
  output: release/update-test
publish:
  provider: generic
  url: http://127.0.0.1:8765
files:
  - dist/**
  - dist-electron/**
  - build/**
  - package.json
mac:
  # Local test builds use an Ad-hoc signature. Use Developer ID credentials
  # for a trusted distribution build and a real macOS update test.
  identity: '-'
  hardenedRuntime: false
  target:
    - dmg
    - zip
  artifactName: FileTerm-${version}-macos-${arch}.${ext}
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: FileTerm-${version}-windows-${arch}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
